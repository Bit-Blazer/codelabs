name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Download CLaaT binary
        run: |
          echo "Downloading claat from https://github.com/Bit-Blazer/codelab-tools..."
          wget -q https://github.com/Bit-Blazer/codelab-tools/releases/latest/download/claat-linux-amd64 -O claat
          chmod +x claat
          ./claat version || echo "claat ready"

      - name: Create codelabs directory if missing
        run: |
          mkdir -p codelabs

      - name: Export codelabs (MD → HTML)
        run: |
          echo "Exporting markdown files to HTML codelabs..."
          for file in codelabs/*.md; do
            if [ -f "$file" ]; then
              echo "  → Exporting $(basename "$file")..."
              ./claat export -o . "$file"
            else
              echo "No markdown files found in codelabs/"
            fi
          done

          echo ""
          echo "Exported codelabs:"
          ls -d */ 2>/dev/null | grep -v -E "^(codelabs|functions|worker|.git|.github)/" || echo "  (none yet)"

      - name: Build catalog index
        run: |
          echo "Building catalog index..."
          node build-index.js . codelabs.json
          echo ""
          echo "Catalog contains $(jq '. | length' codelabs.json) codelabs"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          exclude_assets: '.github,worker,functions,codelabs,build.sh,build.bat,*.md'
